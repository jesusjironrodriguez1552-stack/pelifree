<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jesu Jiron — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #0d0d0d;
      --rojo: #E63946;
      --crema: #F4F1E8;
      --amarillo: #FFD60A;
    }
    html, body { height: 100%; font-family: 'Syne', sans-serif; background: var(--negro); }

    /* FONDO */
    .bg { position: fixed; inset: 0; background: var(--negro); overflow: hidden; z-index: 0; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(230,57,70,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gp 4s ease-in-out infinite alternate;
    }
    @keyframes gp { from{opacity:.3} to{opacity:.9} }
    .bg-c {
      position: absolute; border-radius: 50%; filter: blur(110px);
      animation: drift 9s ease-in-out infinite alternate;
    }
    .bc1 { width:600px;height:600px;background:rgba(230,57,70,.18);top:-200px;right:-150px; }
    .bc2 { width:400px;height:400px;background:rgba(255,214,10,.1);bottom:-80px;left:-80px;animation-delay:4s; }
    @keyframes drift { from{transform:translate(0,0)scale(1)} to{transform:translate(35px,25px)scale(1.08)} }

    /* LAYOUT */
    .container {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh;
    }

    /* IZQUIERDA */
    .left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 64px 60px;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(230,57,70,.12); border: 1px solid rgba(230,57,70,.35);
      color: var(--rojo); padding: 6px 14px; border-radius: 4px;
      font-size: .72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 32px; width: fit-content;
    }
    .dot { width:7px;height:7px;border-radius:50%;background:var(--rojo);animation:blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }
    .big-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 8.5vw, 10rem);
      line-height: .88; color: var(--crema); letter-spacing: 2px;
    }
    .big-title .outline {
      -webkit-text-stroke: 2px var(--rojo);
      color: transparent; display: block;
    }
    .tagline {
      margin-top: 28px; color: rgba(255,255,255,.38);
      font-size: .97rem; line-height: 1.75; max-width: 360px;
    }
    .tagline strong { color: var(--amarillo); font-weight: 800; }
    .left-footer { margin-top: auto; color: rgba(255,255,255,.15); font-size: .75rem; letter-spacing: 1px; }

    /* DERECHA */
    .right {
      display: flex; flex-direction: column; justify-content: center;
      padding: 64px 56px; overflow-y: auto;
    }
    .form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem; color: var(--crema); letter-spacing: 2px;
    }
    .form-sub { color: rgba(255,255,255,.3); font-size: .88rem; margin-top: 4px; margin-bottom: 36px; }

    .tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 32px;
    }
    .tab {
      padding: 10px 0; margin-right: 32px; background: none; border: none;
      color: rgba(255,255,255,.25); font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .88rem; cursor: pointer;
      position: relative; letter-spacing: 1px; transition: color .2s;
    }
    .tab::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--rojo);
      transform: scaleX(0); transition: transform .25s;
    }
    .tab.active { color: var(--crema); }
    .tab.active::after { transform: scaleX(1); }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: .72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,.35); margin-bottom: 8px;
    }
    .field input {
      width: 100%; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1); border-radius: 6px;
      padding: 13px 16px; color: var(--crema);
      font-family: 'Syne', sans-serif; font-size: .95rem;
      transition: border-color .2s, background .2s;
    }
    .field input:focus { outline: none; border-color: var(--rojo); background: rgba(230,57,70,.07); }
    .field input::placeholder { color: rgba(255,255,255,.12); }

    .btn-go {
      width: 100%; padding: 15px; background: var(--rojo); border: none;
      border-radius: 6px; color: #fff; font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: .98rem; letter-spacing: 1px;
      cursor: pointer; margin-top: 6px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(230,57,70,.3);
    }
    .btn-go:hover { background: #c1121f; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(230,57,70,.45); }
    .btn-go:active { transform: translateY(0); }
    .btn-go:disabled { opacity: .6; pointer-events: none; }

    .err { color: #ff7070; font-size: .82rem; margin-top: 10px; min-height: 18px; font-weight: 600; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 40px 24px; }
    }
  </style>
</head>
<body>
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-c bc1"></div>
  <div class="bg-c bc2"></div>
</div>

<div class="container">
  <div class="left">
    <div class="tag"><div class="dot"></div> Tienda online</div>
    <h1 class="big-title">
      JESU
      <span class="outline">JIRON</span>
    </h1>
    <p class="tagline">
      Los mejores productos, sin vueltas.<br/>
      <strong>Calidad real, precios honestos.</strong><br/>
      Hecho con amor desde cero 🔥
    </p>
    <div class="left-footer">© 2025 JESU JIRON • HECHO POR JESÚ</div>
  </div>

  <div class="right">
    <div class="form-title">Bienvenido/a</div>
    <div class="form-sub">Entra a tu cuenta o regístrate gratis</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login',this)">Entrar</button>
      <button class="tab" onclick="switchTab('register',this)">Registrarme</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="l-email" placeholder="tucorreo@gmail.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')loginUser()"/>
      </div>
      <button class="btn-go" id="btn-l" onclick="loginUser()">Entrar a la tienda →</button>
      <div class="err" id="l-err"></div>
    </div>

    <!-- REGISTRO -->
    <div id="form-register" class="hidden">
      <div class="field">
        <label>Tu nombre</label>
        <input type="text" id="r-nombre" placeholder="¿Cómo te llamas?"/>
      </div>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="r-email" placeholder="tucorreo@gmail.com"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres"
               onkeydown="if(event.key==='Enter')registerUser()"/>
      </div>
      <button class="btn-go" id="btn-r" onclick="registerUser()">Crear mi cuenta 🎉</button>
      <div class="err" id="r-err"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ibwldcwxnltvjfzzucqt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_H9z8wXVbH-FGOsfr32IDmA_MODG2eXa';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya hay sesión activa → ir directo a la tienda
  if (localStorage.getItem('jesu_sesion')) window.location.replace('tienda.html');

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  }

  async function loginUser() {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    const errEl = document.getElementById('l-err');
    const btn   = document.getElementById('btn-l');
    errEl.textContent = '';
    if (!email || !pass) { errEl.textContent = '⚠️ Completa todos los campos'; return; }
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      // maybeSingle() devuelve null si no encuentra, sin lanzar error
      const { data, error } = await sb.from('usuarios')
        .select('*').eq('correo', email).eq('contrasena', pass).maybeSingle();
      if (error) {
        // Error real de conexión o de Supabase
        errEl.textContent = '❌ Error de conexión. Revisa config.js';
      } else if (!data) {
        // No se encontró el usuario — credenciales incorrectas
        errEl.textContent = '❌ Correo o contraseña incorrectos';
      } else {
        localStorage.setItem('jesu_sesion', JSON.stringify(data));
        window.location.href = 'tienda.html';
        return;
      }
    } catch(e) {
      errEl.textContent = '❌ Error de conexión. Revisa config.js';
      console.error(e);
    }
    btn.disabled = false; btn.textContent = 'Entrar a la tienda →';
  }

  async function registerUser() {
    const nombre = document.getElementById('r-nombre').value.trim();
    const email  = document.getElementById('r-email').value.trim();
    const pass   = document.getElementById('r-pass').value;
    const errEl  = document.getElementById('r-err');
    const btn    = document.getElementById('btn-r');
    errEl.textContent = '';
    if (!nombre || !email || !pass) { errEl.textContent = '⚠️ Completa todos los campos'; return; }
    if (pass.length < 6) { errEl.textContent = '⚠️ Contraseña mínimo 6 caracteres'; return; }
    btn.disabled = true; btn.textContent = 'Creando cuenta...';

    // Paso 1: verificar si ya existe
    const { data: existe, error: errExiste } = await sb
      .from('usuarios').select('id').eq('correo', email).maybeSingle();

    if (errExiste) {
      errEl.textContent = '❌ Error de conexión: ' + errExiste.message;
      btn.disabled = false; btn.textContent = 'Crear mi cuenta 🎉';
      console.error('Error verificando usuario:', errExiste);
      return;
    }
    if (existe) {
      errEl.textContent = '⚠️ Ese correo ya está registrado';
      btn.disabled = false; btn.textContent = 'Crear mi cuenta 🎉';
      return;
    }

    // Paso 2: insertar usuario
    const { data, error: errInsert } = await sb
      .from('usuarios')
      .insert([{ nombre, correo: email, contrasena: pass }])
      .select()
      .maybeSingle();

    if (errInsert) {
      errEl.textContent = '❌ ' + errInsert.message;
      btn.disabled = false; btn.textContent = 'Crear mi cuenta 🎉';
      console.error('Error insertando usuario:', errInsert);
      return;
    }
    if (!data) {
      errEl.textContent = '❌ No se creó la cuenta. Revisa las políticas RLS en Supabase.';
      btn.disabled = false; btn.textContent = 'Crear mi cuenta 🎉';
      return;
    }

    localStorage.setItem('jesu_sesion', JSON.stringify(data));
    window.location.href = 'tienda.html';
  }
</script>
</body>
</html>
